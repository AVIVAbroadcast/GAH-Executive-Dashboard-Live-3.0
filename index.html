<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAH Executive Dashboard v4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#0b1220;
color:#fff;
padding:15px;
}

.header{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.header h1{
font-size:20px;
}

.header p{
font-size:12px;
color:#94a3b8;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.card-title{
font-size:12px;
color:#94a3b8;
margin-bottom:8px;
}

.card-value{
font-size:20px;
font-weight:bold;
}

.availability-wrap{
overflow:auto;
background:#111827;
padding:10px;
border-radius:12px;
}

table{
border-collapse:collapse;
font-size:11px;
min-width:100%;
}

th,td{
padding:5px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
}

.room-col{
position:sticky;
left:0;
background:#111827;
z-index:2;
}

.cell{
width:20px;
height:20px;
border-radius:4px;
}

.avail{background:#22C55E;}
.sold{background:#EF4444;}
.maint{background:#A855F7;}
.ooo{background:#94A3B8;}
.booked{background:#EAB308;}
.checkin{background:#3B82F6;}
.checkout{background:#F59E0B;}

.legend{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
font-size:11px;
}

.legend div{
display:flex;
align-items:center;
gap:5px;
}

.legend span{
width:12px;
height:12px;
display:inline-block;
border-radius:3px;
}
</style>

</head>

<body>

<div class="header">
<h1>🏨 Grand Aquarium Hotel</h1>
<p>Executive Dashboard Live</p>
</div>

<div class="grid">
<div class="card">
<div class="card-title">Total Revenue MTD</div>
<div class="card-value" id="totalRevenue">-</div>
</div>

<div class="card">
<div class="card-title">Room Revenue</div>
<div class="card-value" id="roomRevenue">-</div>
</div>

<div class="card">
<div class="card-title">Deposit Received</div>
<div class="card-value" id="depositReceived">-</div>
</div>

<div class="card">
<div class="card-title">Occupancy Live</div>
<div class="card-value" id="occupancyLive">-</div>
</div>

<div class="card">
<div class="card-title">Available</div>
<div class="card-value" id="availableRooms">-</div>
</div>

<div class="card">
<div class="card-title">Sold</div>
<div class="card-value" id="soldRooms">-</div>
</div>

<div class="card">
<div class="card-title">Maintenance</div>
<div class="card-value" id="maintRooms">-</div>
</div>

<div class="card">
<div class="card-title">Out of Order</div>
<div class="card-value" id="oooRooms">-</div>
</div>
</div>

<div class="legend">
<div><span class="avail"></span> Available</div>
<div><span class="sold"></span> Sold</div>
<div><span class="booked"></span> Booked</div>
<div><span class="checkin"></span> Check In</div>
<div><span class="checkout"></span> Check Out</div>
<div><span class="maint"></span> Maintenance</div>
<div><span class="ooo"></span> OOO</div>
</div>

<div class="availability-wrap">
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

function formatRupiah(num){
return "Rp " + Number(num).toLocaleString("id-ID");
}

async function loadDashboard(){
const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("totalRevenue").innerText = formatRupiah(data.dashboard.totalRevenueMtd);
document.getElementById("roomRevenue").innerText = formatRupiah(data.dashboard.roomRevenue);
document.getElementById("depositReceived").innerText = formatRupiah(data.dashboard.depositReceived);
document.getElementById("occupancyLive").innerText = (data.dashboard.occupancyLive * 100).toFixed(1) + "%";
document.getElementById("availableRooms").innerText = data.dashboard.available;
document.getElementById("soldRooms").innerText = data.dashboard.sold;
document.getElementById("maintRooms").innerText = data.dashboard.maintenance;
document.getElementById("oooRooms").innerText = data.dashboard.outOfOrder;

renderAvailability(data.availability);
}

function renderAvailability(avail){
let head = "<tr><th class='room-col'>Room</th>";
avail.dates.forEach(d=>{
head += `<th>${d.slice(5)}</th>`;
});
head += "</tr>";

document.getElementById("tableHead").innerHTML = head;

let body = "";

avail.rooms.forEach((room,index)=>{
body += `<tr><td class="room-col">${room}</td>`;

avail.matrix[index].forEach(status=>{
let cls="avail";

if(status==="SOLD") cls="sold";
if(status==="BOOKED") cls="booked";
if(status==="CHECKIN") cls="checkin";
if(status==="CHECKOUT") cls="checkout";
if(status==="MAINT") cls="maint";
if(status==="OOO") cls="ooo";

body += `<td><div class="cell ${cls}"></div></td>`;
});

body += "</tr>";
});

document.getElementById("tableBody").innerHTML = body;
}

loadDashboard();
</script>

</body>
</html>
